<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winkelmandje - Het Voorlaatste Nieuws</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <a href="/" class="logo">Het Voorlaatste Nieuws</a>
  </nav>

  <!-- Navigation Menu -->
  <nav class="navbar">
    <a href="/" class="nav-item">Startpagina</a>
    <a href="/shop" class="nav-item">Shop</a>
    <a href="/cart" class="nav-item active">Winkelmandje</a>
    <a href="/cms" class="nav-item">Dashboard</a>
    <a href="/#" id="cart-icon-nav" class="nav-item cart-icon-nav">
      🛒 <span id="cart-badge-nav" class="cart-badge"></span>
    </a>
  </nav>

  <main class="container">
    <section class="cart-wrapper">
      <h1>Winkelmandje</h1>

      <div id="cart-content">
        <!-- Cart items will be rendered here -->
      </div>

      <div id="cart-empty" style="display: none;">
        <p class="empty-message">Je winkelmandje is leeg</p>
        <a href="/shop" class="btn btn-primary">Terug naar shop</a>
      </div>

      <div id="cart-summary" style="display: none;">
        <div class="cart-totals">
          <div class="total-row">
            <span>Subtotaal:</span>
            <span id="subtotal">€0,00</span>
          </div>
          <div class="total-row">
            <span>Verzending:</span>
            <span id="shipping">Gratis</span>
          </div>
          <div class="total-row total">
            <span>Totaal:</span>
            <span id="total">€0,00</span>
          </div>
        </div>

        <button id="checkout-btn" class="btn btn-primary btn-large">Naar kassa (Stripe)</button>
        <a href="/shop" class="btn btn-secondary">Nog een product toevoegen</a>
      </div>
    </section>

    <form id="shipping-form" class="shipping-form" autocomplete="shipping address-line1">
      <h3>Leveradres</h3>
      <div class="form-row">
        <label for="shipping_email">E-mail</label>
        <input type="email" id="shipping_email" name="shipping_email" required autocomplete="email">
      </div>
      <div class="form-row">
        <label for="shipping_name">Naam</label>
        <input type="text" id="shipping_name" name="shipping_name" required autocomplete="name">
      </div>
      <div class="form-row">
        <label for="shipping_address">Adres</label>
        <input type="text" id="shipping_address" name="shipping_address" required autocomplete="address-line1">
      </div>
      <div class="form-row">
        <label for="shipping_postal">Postcode</label>
        <input type="text" id="shipping_postal" name="shipping_postal" required autocomplete="postal-code">
      </div>
      <div class="form-row">
        <label for="shipping_city">Stad</label>
        <input type="text" id="shipping_city" name="shipping_city" required autocomplete="address-level2">
      </div>
    </form>

    <div id="checkout-status" class="status-message"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/cart.js"></script>
  <script>
    function formatPrice(cents) {
      return (cents / 100).toLocaleString('nl-BE', { style: 'currency', currency: 'EUR' });
    }

    function renderCart() {
      const items = cart.getItems();
      const container = document.getElementById('cart-content');
      const empty = document.getElementById('cart-empty');
      const summary = document.getElementById('cart-summary');

      if (items.length === 0) {
        container.style.display = 'none';
        empty.style.display = 'block';
        summary.style.display = 'none';
        return;
      }

      container.style.display = 'block';
      empty.style.display = 'none';
      summary.style.display = 'block';

      container.innerHTML = items.map(item => `
        <div class="cart-item">
          <div class="cart-item-image">
            <img src="${item.image}" alt="${item.title}">
          </div>
          <div class="cart-item-details">
            <h3>${item.title}</h3>
            <p class="cart-item-price">${formatPrice(item.price_cents)} per stuk</p>
          </div>
          <div class="cart-item-controls">
            <label>Hoeveelheid:</label>
            <input type="number" min="1" value="${item.quantity}" data-product-id="${item.id}" class="quantity-input">
            <p class="subtotal">${formatPrice(item.price_cents * item.quantity)}</p>
            <button class="btn-remove" data-product-id="${item.id}">Verwijderen</button>
          </div>
        </div>
      `).join('');

      // Update totals
      document.getElementById('subtotal').textContent = formatPrice(cart.getTotal());
      document.getElementById('total').textContent = formatPrice(cart.getTotal());

      // Event listeners
      container.querySelectorAll('.quantity-input').forEach(input => {
        input.addEventListener('change', (e) => {
          const productId = e.target.dataset.productId;
          const quantity = parseInt(e.target.value) || 1;
          cart.updateQuantity(productId, quantity);
          renderCart();
        });
      });

      container.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const productId = e.target.dataset.productId;
          cart.removeItem(productId);
          renderCart();
        });
      });

      updateCartBadge();
    }

    async function checkout() {
      const items = cart.getItems();
      if (items.length === 0) return;

      // Verzamel leveradres
      const form = document.getElementById('shipping-form');
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }
      const customer_email = form.shipping_email.value.trim();
      const shipping_address = {
        name: form.shipping_name.value.trim(),
        address: form.shipping_address.value.trim(),
        postal: form.shipping_postal.value.trim(),
        city: form.shipping_city.value.trim()
      };

      try {
        const response = await fetch('/api/stripe/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items, shipping_address, customer_email })
        });

        const data = await response.json();

        if (data.error) {
          document.getElementById('checkout-status').innerHTML = 
            `<div class="error">${data.error}</div>`;
          return;
        }

        if (data.checkout_url) {
          window.location.href = data.checkout_url;
        }
      } catch (error) {
        document.getElementById('checkout-status').innerHTML = 
          `<div class="error">Fout bij checkout: ${error.message}</div>`;
      }
    }

    async function handleCheckoutReturn() {
      const params = new URLSearchParams(window.location.search);
      const checkoutState = params.get('checkout');
      const sessionId = params.get('session_id');
      const statusEl = document.getElementById('checkout-status');

      if (!checkoutState) {
        return;
      }

      if (checkoutState === 'cancelled') {
        statusEl.className = 'status-message error';
        statusEl.textContent = 'Betaling geannuleerd. Je kan opnieuw proberen.';
        return;
      }

      if (checkoutState === 'success' && sessionId) {
        try {
          const response = await fetch('/api/stripe/confirm-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId })
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || 'Kon bestelling niet bevestigen.');
          }

          cart.clear();
          renderCart();
          statusEl.className = 'status-message success';
          statusEl.textContent = 'Betaling gelukt. Bestelling is opgeslagen.';
        } catch (error) {
          statusEl.className = 'status-message error';
          statusEl.textContent = `Betaling gelukt, maar order-opslag mislukte: ${error.message}`;
        }
      }
    }

    document.getElementById('checkout-btn')?.addEventListener('click', checkout);
    
    window.addEventListener('cartUpdated', renderCart);
    document.addEventListener('DOMContentLoaded', async () => {
      renderCart();
      await handleCheckoutReturn();
    });
  </script>
</body>
</html>
